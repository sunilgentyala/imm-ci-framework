# IMM-CI Assessment Profile: Water/Wastewater — Level 3 (Post-Pilot)
# Lakeshore Metropolitan Water Authority after 18-month IMM-CI transition.
# Documented in paper Section XIV-A. FIDO2 deployed for privileged users,
# SCIM deprovisioning latency reduced 93%, ITDR active at IT/OT boundary.
# Two open NERC CIP-equivalent audit findings closed.

organization: "Lakeshore Metropolitan Water Authority (Level 3 Post-Pilot)"

iam:
  password_only: false
  mfa_enforced: true
  ldap_ad_integration: true
  partial_abac: true
