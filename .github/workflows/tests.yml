name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run sample assessment (smoke test)
        run: python imm_ci_assessor.py --config config/sample_org.yaml --json-out /tmp/result.json

      - name: Verify JSON output
        run: python -c "
import json
with open('/tmp/result.json') as f:
    r = json.load(f)
assert r['composite_level'] == 2, f'Expected L2, got L{r[\"composite_level\"]}'
assert r['stall_warning'] is True, 'Expected stall warning for L2 org'
print(f'Smoke test passed: {r[\"org_name\"]} at Level {r[\"composite_level\"]}')
"
